<input

required>

<select>

<option>Visita Libre</option>
<option>Visita Guiada</option>
<option>Grupo Turístico</option>
<option>Excursión Universitaria</option>
</select>

rows="5"
placeholder="Observaciones">
</textarea>

<button type="submit">
Reservar
</button>
